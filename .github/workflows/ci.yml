name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      # DATABASE_URL is intentionally not set — DB-dependent tests skip via
      # describe.skipIf(!process.env.DATABASE_URL) guards added to each file.
      - name: Run backend tests
        run: cd backend && npm test -- --run

      - name: Build frontend
        run: cd frontend && npm run build
