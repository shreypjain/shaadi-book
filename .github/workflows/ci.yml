name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm install

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Backend tests
        run: cd backend && npm test -- --run

      - name: Frontend build
        run: cd frontend && npm run build
